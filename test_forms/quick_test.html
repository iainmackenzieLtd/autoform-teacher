<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quick Test Form</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
  h1 { font-size: 1.4rem; margin-bottom: 1.5rem; }
  label { display: block; font-weight: bold; margin-top: 1.2rem; margin-bottom: 0.3rem; }
  input, select, textarea { width: 100%; padding: 8px; font-size: 1rem; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
  button { margin-top: 1.5rem; padding: 10px 24px; font-size: 1rem; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<h1>Application Form — Quick Test</h1>

<label for="full_name">Full name</label>
<input type="text" id="full_name" name="full_name">

<label for="email">Email address</label>
<input type="email" id="email" name="email">

<label for="phone">Phone number</label>
<input type="tel" id="phone" name="phone">

<label for="title">Title</label>
<select id="title" name="title">
  <option value="">-- Select --</option>
  <option value="Mr">Mr</option>
  <option value="Ms">Ms</option>
  <option value="Mrs">Mrs</option>
  <option value="Dr">Dr</option>
  <option value="Prof">Prof</option>
</select>

<label for="postcode">Postcode</label>
<input type="text" id="postcode" name="postcode">

<label for="ni_number">National Insurance number</label>
<input type="text" id="ni_number" name="ni_number">

<label for="supporting_statement">Supporting statement (leave blank — write this yourself)</label>
<textarea id="supporting_statement" name="supporting_statement" rows="4"></textarea>

<button type="button" id="submit_btn" onclick="handleSubmit()">Submit Application</button>
<p id="confirm_msg" style="display:none;margin-top:1rem;padding:12px;background:#d4edda;color:#155724;border-radius:4px;font-weight:bold;">
  ✓ Application submitted successfully. You will receive a confirmation email shortly.
</p>
<script>
function handleSubmit() {
  document.getElementById('submit_btn').disabled = true;
  document.getElementById('submit_btn').textContent = '✓ Submitted';
  document.getElementById('submit_btn').style.background = '#28a745';
  document.getElementById('confirm_msg').style.display = 'block';
}
</script>
</body>
</html>
