<!DOCTYPE html>
<html>
<head><title>Teaching CV Form - Sample (based on First Class Supply)</title></head>
<body>
<form>

  <h2>Personal Information</h2>
  <label for="full_name">Full Name *</label>
  <input type="text" id="full_name" name="full_name" required>

  <h2>Professional Profile</h2>
  <label for="profile">Profile *</label>
  <textarea id="profile" name="profile" required></textarea>

  <h2>Interests</h2>
  <label for="interest_1">Interest 1 *</label>
  <input type="text" id="interest_1" name="interest_1" required>
  <label for="interest_2">Interest 2</label>
  <input type="text" id="interest_2" name="interest_2">
  <label for="interest_3">Interest 3</label>
  <input type="text" id="interest_3" name="interest_3">

  <h2>Key Skills</h2>
  <label for="skill_1">Key Skill 1 *</label>
  <input type="text" id="skill_1" name="skill_1" required>
  <label for="skill_2">Key Skill 2</label>
  <input type="text" id="skill_2" name="skill_2">
  <label for="skill_3">Key Skill 3</label>
  <input type="text" id="skill_3" name="skill_3">
  <label for="skill_4">Key Skill 4</label>
  <input type="text" id="skill_4" name="skill_4">
  <label for="skill_5">Key Skill 5</label>
  <input type="text" id="skill_5" name="skill_5">

  <h2>Qualifications (most recent first)</h2>
  <label for="qual_1_year">Year</label>
  <input type="text" id="qual_1_year" name="qual_1_year">
  <label for="qual_1_institution">Place of Study / Awarding Body</label>
  <input type="text" id="qual_1_institution" name="qual_1_institution">
  <label for="qual_1_name">Qualification Name</label>
  <input type="text" id="qual_1_name" name="qual_1_name">

  <label for="qual_2_year">Year</label>
  <input type="text" id="qual_2_year" name="qual_2_year">
  <label for="qual_2_institution">Place of Study / Awarding Body</label>
  <input type="text" id="qual_2_institution" name="qual_2_institution">
  <label for="qual_2_name">Qualification Name</label>
  <input type="text" id="qual_2_name" name="qual_2_name">

  <label for="qual_3_year">Year</label>
  <input type="text" id="qual_3_year" name="qual_3_year">
  <label for="qual_3_institution">Place of Study / Awarding Body</label>
  <input type="text" id="qual_3_institution" name="qual_3_institution">
  <label for="qual_3_name">Qualification Name</label>
  <input type="text" id="qual_3_name" name="qual_3_name">

  <h2>Training / CPD</h2>
  <label for="train_1_year">Year</label>
  <input type="text" id="train_1_year" name="train_1_year">
  <label for="train_1_provider">Place of Study / Awarding Body</label>
  <input type="text" id="train_1_provider" name="train_1_provider">
  <label for="train_1_course">Course Name</label>
  <input type="text" id="train_1_course" name="train_1_course">

  <label for="train_2_year">Year</label>
  <input type="text" id="train_2_year" name="train_2_year">
  <label for="train_2_provider">Place of Study / Awarding Body</label>
  <input type="text" id="train_2_provider" name="train_2_provider">
  <label for="train_2_course">Course Name</label>
  <input type="text" id="train_2_course" name="train_2_course">

  <h2>Work Experience (most recent first)</h2>
  <label for="job_1_from">From (month/year) *</label>
  <input type="text" id="job_1_from" name="job_1_from" required>
  <label for="job_1_to">To (month/year or Present) *</label>
  <input type="text" id="job_1_to" name="job_1_to" required>
  <label for="job_1_school">School Name *</label>
  <input type="text" id="job_1_school" name="job_1_school" required>
  <label for="job_1_title">Job Title *</label>
  <input type="text" id="job_1_title" name="job_1_title" required>
  <label for="job_1_duties">Duties and Responsibilities *</label>
  <textarea id="job_1_duties" name="job_1_duties" required></textarea>

  <label for="job_2_from">From (month/year)</label>
  <input type="text" id="job_2_from" name="job_2_from">
  <label for="job_2_to">To (month/year or Present)</label>
  <input type="text" id="job_2_to" name="job_2_to">
  <label for="job_2_school">School Name</label>
  <input type="text" id="job_2_school" name="job_2_school">
  <label for="job_2_title">Job Title</label>
  <input type="text" id="job_2_title" name="job_2_title">
  <label for="job_2_duties">Duties and Responsibilities</label>
  <textarea id="job_2_duties" name="job_2_duties"></textarea>

  <h2>Additional Information</h2>
  <label for="additional">Additional Information (employment gaps, other roles)</label>
  <textarea id="additional" name="additional"></textarea>

  <button type="submit">Submit CV</button>
</form>
</body>
</html>
